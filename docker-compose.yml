services:
  app:
    build: .
    container_name: riccardomandich_app
    restart: unless-stopped
    volumes:
      - ./storage:/var/www/html/storage
    environment:
      - DB_HOST=db
      - DB_DATABASE=${DB_DATABASE}
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}
    networks:
      - internal
    depends_on:
      - db

  nginx:
    image: nginx:alpine
    container_name: riccardomandich_nginx
    restart: unless-stopped
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./public:/var/www/html/public:ro
    networks:
      - internal
      - proxy
    depends_on:
      - app
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.riccardomandich.rule=Host(`riccardo.mandich.dev`)"
      - "traefik.http.routers.riccardomandich.entrypoints=websecure"
      - "traefik.http.routers.riccardomandich.tls.certresolver=letsencrypt"
      - "traefik.http.services.riccardomandich.loadbalancer.server.port=80"

  db:
    image: mariadb:11
    container_name: riccardomandich_db
    restart: unless-stopped
    environment:
      - MYSQL_DATABASE=${DB_DATABASE}
      - MYSQL_USER=${DB_USERNAME}
      - MYSQL_PASSWORD=${DB_PASSWORD}
      - MYSQL_RANDOM_ROOT_PASSWORD=true
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - internal

networks:
  internal:
    driver: bridge
  proxy:
    external: true

volumes:
  db_data:
