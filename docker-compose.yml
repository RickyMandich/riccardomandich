services:
  app:
    build: .
    container_name: riccardomandich_app
    restart: unless-stopped
    volumes:
      - ./storage:/var/www/html/storage
    environment:
      - DB_HOST=db
      - DB_DATABASE=my_riccardomandich
      - DB_USERNAME=riccardomandich
      - DB_PASSWORD=
    networks:
      internal:
        ipv4_address: 172.20.0.10
    depends_on:
      db:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    container_name: riccardomandich_nginx
    restart: unless-stopped
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./public:/var/www/html/public:ro
    networks:
      - internal
      - proxy
    depends_on:
      - app
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.riccardomandich.rule=Host(`riccardo.mandich.dev`)"
      - "traefik.http.routers.riccardomandich.entrypoints=websecure"
      - "traefik.http.routers.riccardomandich.tls.certresolver=letsencrypt"
      - "traefik.http.services.riccardomandich.loadbalancer.server.port=80"

  db:
    image: mariadb:11
    container_name: riccardomandich_db
    restart: unless-stopped
    environment:
      - MYSQL_ALLOW_EMPTY_PASSWORD=yes
      - MYSQL_DATABASE=my_riccardomandich
    volumes:
      - db_data:/var/lib/mysql
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - internal
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

networks:
  internal:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/24
  proxy:
    external: true

volumes:
  db_data:
